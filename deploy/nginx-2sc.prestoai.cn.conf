# Nginx：2sc.prestoai.cn（H5 + API 同域）
# 路径：/etc/nginx/sites-available/2sc.prestoai.cn
# 启用：sudo ln -sf .../2sc.prestoai.cn /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS（推荐）：
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d 2sc.prestoai.cn

server {
    listen 80;
    server_name 2sc.prestoai.cn;

    # certbot 会自动添加 443 + ssl_certificate

    client_max_body_size 20m;

    # ── FastAPI（小爱 SSE 需长超时）──
    location ~ ^/(bible|guide|ai|auth|sync|content|social|health|docs|openapi\.json)(/|$) {
        proxy_pass http://127.0.0.1:8011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # ── Next.js 静态资源（须与下方 Web 同一端口）──
    location /_next/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 首页 HTML 勿缓存（发版后若仍见 3,842 假点赞，多为此处或宝塔全页缓存）
    location = / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── Next.js H5（根路径，无 /2sc 前缀）──
    location / {
        # 与 .env.production 中 WEB_HOST_PORT 一致（生产默认 3002）
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-cache, private, must-revalidate" always;
    }
}

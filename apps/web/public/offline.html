<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f0e8" />
  <title>彼爱 · 离线</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #f5f0e8;
      color: #2c2419;
      text-align: center;
    }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { margin: 0 0 16px; font-size: 14px; line-height: 1.6; color: #6b6258; }
    a {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: #3d6b8e;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div>
    <h1>当前无网络</h1>
    <p>已为你保留离线可读内容。请返回首页继续读经，或连接网络后刷新。</p>
    <a href="/">返回首页</a>
  </div>
  <script>
    if (navigator.onLine) location.replace('/');
  </script>
</body>
</html>

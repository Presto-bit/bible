# 宝塔站点 2sc.prestoai.cn — 粘贴到 server { } 内（替换 PHP/静态规则）
# 务必注释：enable-php、root/index 托管、location ~ .*\.(js|css) 等宝塔默认块
# extension 目录若含 proxy_cache 或静态规则，请删除或移到本段之后

client_max_body_size 20m;

location ~ ^/(bible|guide|ai|auth|sync|content|social|health|docs|openapi\.json)(/|$) {
    proxy_pass http://127.0.0.1:8011;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_buffering off;
}

# ^~ 防止被宝塔 location ~ .*\.(js|css) 抢走
location ^~ /_next/ {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 首页 HTML 勿缓存（曾被宝塔/Nginx 按 s-maxage 缓存一年导致发版后仍显示旧版）
location = / {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
    proxy_cache off;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
}

location / {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    add_header Cache-Control "no-cache, private, must-revalidate" always;
}

# 以下宝塔默认块请注释或删除，否则会 404 静态资源：
# include enable-php-82.conf;
# location ~ .*\.(js|css)?$ { ... }

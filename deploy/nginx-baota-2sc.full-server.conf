# 宝塔完整 server 块参考（2sc.prestoai.cn）
# 路径：/www/server/panel/vhost/nginx/2sc.prestoai.cn.conf
# 改后：nginx -t && nginx -s reload
# 并在宝塔 → 网站 → 性能优化 → 关闭「静态缓存 / 全站加速」

server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name 2sc.prestoai.cn;

    # 纯反代 Next.js，勿用 root 托管（否则可能优先返回旧 index.html）
    # root /www/wwwroot/2sc.prestoai.cn;
    # index index.php index.html index.htm default.php default.htm default.html;

    include /www/server/panel/vhost/nginx/well-known/2sc.prestoai.cn.conf;

    # 若 extension 内含 proxy_cache 或 js|css 静态规则，请移除此行或清空该目录
    # include /www/server/panel/vhost/nginx/extension/2sc.prestoai.cn/*.conf;

    ssl_certificate    /www/server/panel/vhost/cert/2sc.prestoai.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/2sc.prestoai.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;

    client_max_body_size 20m;

    location ~ ^/(bible|guide|ai|auth|sync|content|social|push|analytics|health|docs|openapi\.json)(/|$) {
        proxy_pass http://127.0.0.1:8011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location ~ ^/admin/(auth|rag|ops)(/|$)|^/admin/stats$|^/admin/stats/detail {
        proxy_pass http://127.0.0.1:8011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location ^~ /_next/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 关键：仅 / 被宝塔长期缓存时，/?v=1 是新、/ 是旧 — 须单独处理精确路径 /
    location = / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Bible-Cache "bypass-root" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, private, must-revalidate" always;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    access_log /www/wwwlogs/2sc.prestoai.cn.log;
    error_log /www/wwwlogs/2sc.prestoai.cn.error.log;
}

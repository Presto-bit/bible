<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6faf7"/>
      <stop offset="0.55" stop-color="#dceee2"/>
      <stop offset="1" stop-color="#96bea8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.46" r="0.42">
      <stop offset="0" stop-color="#fff9ea" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#fff9ea" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pages" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffef9"/>
      <stop offset="1" stop-color="#efe2c6"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a6848"/>
      <stop offset="1" stop-color="#6a4e34"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="400" height="320" fill="url(#bg)"/>
  <ellipse cx="200" cy="168" rx="160" ry="118" fill="url(#glow)"/>

  <!-- 左：简化头像 + 肩线 -->
  <g fill="#355a48" opacity="0.88">
    <circle cx="96" cy="128" r="28"/>
    <path d="M54 198c8-34 24-52 42-52s34 18 42 52c-12-10-28-16-42-16s-30 6-42 16z"/>
  </g>
  <path d="M68 168c10-8 20-12 28-12" fill="none" stroke="#5a8868" stroke-width="2" stroke-linecap="round" opacity="0.28"/>

  <!-- 右：简化头像 + 肩线 -->
  <g fill="#3d6450" opacity="0.88">
    <circle cx="304" cy="128" r="28"/>
    <path d="M262 198c8-34 24-52 42-52s34 18 42 52c-12-10-28-16-42-16s-30 6-42 16z"/>
  </g>
  <path d="M332 168c-10-8-20-12-28-12" fill="none" stroke="#5a8868" stroke-width="2" stroke-linecap="round" opacity="0.28"/>

  <!-- 中心打开的书（共读主体） -->
  <g transform="translate(200 178)">
    <ellipse cx="0" cy="10" rx="78" ry="28" fill="#284838" opacity="0.12"/>
    <ellipse cx="0" cy="-2" rx="70" ry="34" fill="#fff6d8" opacity="0.4" filter="url(#blur)"/>
    <path d="M-72 0 Q0 -18 72 0 L72 34 Q0 48 -72 34 Z" fill="url(#cover)"/>
    <path d="M-64 4 L0 -12 L64 4 L64 28 L0 40 L-64 28 Z" fill="url(#pages)"/>
    <path d="M0 -12 L0 40" stroke="#b89868" stroke-width="2" stroke-linecap="round"/>
    <path d="M-44 10 L-16 16 M16 16 L44 10 M-38 22 L-14 26 M14 26 L38 22"
          fill="none" stroke="#c0a880" stroke-width="1.6" stroke-linecap="round" opacity="0.72"/>
  </g>

  <ellipse cx="200" cy="300" rx="170" ry="28" fill="#284838" opacity="0.1"/>
</svg>

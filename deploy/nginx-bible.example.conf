# Nginx 示例：www.prestoai.cn 上的 Bible H5 + API
# 合并到现有 server {} 块，或单独 include。
# 测试：sudo nginx -t && sudo nginx -s reload

# ── Next.js H5（/2sc 前缀原样转发，勿 rewrite 去掉 basePath）──
location /2sc {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # HTML 短缓存 / 不缓存，避免发版后长期旧页
    add_header Cache-Control "no-cache, private, must-revalidate" always;
}

# ── FastAPI（与 apps/web/lib/api.ts 路径一致）──
location ~ ^/(bible|guide|ai|auth|sync|content|social|health)(/|$) {
    proxy_pass http://127.0.0.1:8011;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;
}

# SSE：小爱流式
location /ai/chat {
    proxy_pass http://127.0.0.1:8011;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
}

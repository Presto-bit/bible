<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#f4faf6"/>
      <stop offset="0.45" stop-color="#d4eadc"/>
      <stop offset="1" stop-color="#8eb89a"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.38" r="0.42">
      <stop offset="0" stop-color="#fff8e6" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#ffe8b8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffe8b8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="table" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c9a878" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8a6848" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="book" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f0e4c8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="400" height="320" fill="url(#sky)"/>

  <!-- 窗光 -->
  <rect x="28" y="42" width="56" height="88" rx="6" fill="#fffaf0" opacity="0.55"/>
  <rect x="36" y="50" width="40" height="72" rx="4" fill="#fff6d8" opacity="0.42"/>
  <g opacity="0.28" stroke="#f0d888" stroke-width="1.5">
    <line x1="56" y1="50" x2="56" y2="122"/>
    <line x1="36" y1="86" x2="76" y2="86"/>
  </g>
  <path d="M84 54 L120 78 L84 102 Z" fill="#fff4c8" opacity="0.22" filter="url(#soft)"/>

  <!-- 顶灯暖晕 -->
  <ellipse cx="200" cy="118" rx="148" ry="96" fill="url(#lamp)"/>

  <!-- 围桌弧线 -->
  <path d="M72 228 Q200 168 328 228" fill="none" stroke="#5a8868" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>
  <ellipse cx="200" cy="236" rx="118" ry="28" fill="url(#table)"/>

  <!-- 同行剪影 -->
  <g fill="#3d6850" opacity="0.72">
    <ellipse cx="92" cy="198" rx="22" ry="20"/>
    <path d="M70 218 Q92 196 114 218 L108 252 Q92 244 76 252 Z"/>
    <ellipse cx="148" cy="184" rx="20" ry="18"/>
    <path d="M128 202 Q148 182 168 202 L164 244 Q148 238 132 244 Z"/>
    <ellipse cx="252" cy="184" rx="20" ry="18"/>
    <path d="M232 202 Q252 182 272 202 L268 244 Q252 238 236 244 Z"/>
    <ellipse cx="308" cy="198" rx="22" ry="20"/>
    <path d="M286 218 Q308 196 330 218 L324 252 Q308 244 292 252 Z"/>
  </g>

  <!-- 中心打开的圣经 -->
  <g transform="translate(200 214)">
    <path d="M-38 -6 Q0 -18 38 -6 L38 22 Q0 30 -38 22 Z" fill="#9a7858" opacity="0.85"/>
    <path d="M-34 -2 L0 -12 L34 -2 L34 18 L0 24 L-34 18 Z" fill="url(#book)"/>
    <path d="M0 -12 L0 24" stroke="#c9a878" stroke-width="1.2" opacity="0.65"/>
    <path d="M-22 2 L-8 6 M8 6 L22 2 M-18 12 L-6 14 M6 14 L18 12" stroke="#b8a080" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <ellipse cx="0" cy="2" rx="30" ry="14" fill="#fff8e0" opacity="0.35" filter="url(#soft)"/>
  </g>

  <!-- 连结光点 -->
  <g fill="#f0d878" opacity="0.75">
    <circle cx="118" cy="206" r="3.5"/>
    <circle cx="168" cy="192" r="3"/>
    <circle cx="232" cy="192" r="3"/>
    <circle cx="282" cy="206" r="3.5"/>
    <circle cx="200" cy="204" r="4"/>
  </g>
  <path d="M118 206 Q160 188 200 204 T282 206" fill="none" stroke="#e8c868" stroke-width="1.5" stroke-dasharray="4 7" opacity="0.45"/>

  <!-- 前景薄雾 -->
  <rect width="400" height="320" fill="url(#sky)" opacity="0.08"/>
  <ellipse cx="200" cy="300" rx="180" ry="36" fill="#2a4838" opacity="0.08"/>
</svg>

# Bible App 生产栈：Postgres + FastAPI + Next.js
# 用法：docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
name: bible-app

services:
  postgres:
    image: postgres:16-alpine
    container_name: bible-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bible}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env.production}
      POSTGRES_DB: ${DB_NAME:-bible}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - bible_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bible} -d ${DB_NAME:-bible}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: bible-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bible}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-bible}
      BIBLE_DB_PATH: /app/build/bible_cnv.sqlite
      BIBLE_KJV_DB_PATH: /app/build/bible_kjv.sqlite
      BIBLE_CUVS_DB_PATH: /app/build/bible_cuvs.sqlite
      CONTENT_DATA_DIR: /app/data
    ports:
      - "127.0.0.1:8011:8011"
    volumes:
      - bible_sqlite_data:/app/build
      # RAG 源 md 与后台上传持久化（重建容器不丢资料）
      - bible_rag_content:/app/content/commentary
      - bible_rag_uploads:/app/data/rag/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8011/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://2sc.prestoai.cn}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-dev}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    container_name: bible-web
    restart: unless-stopped
    # 只读根文件系统：降低容器内改写 server.js 类劫持的成功率（仍需修主机失守）
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /app/.next/cache:size=64M,uid=1001,gid=1001,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3002}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

volumes:
  bible_pg_data:
  bible_sqlite_data:
  bible_rag_content:
  bible_rag_uploads:
